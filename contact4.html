<!DOCTYPE html>
<html>
  <head>
    <title>Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <section class="py-20">
      <div class="max-w-5xl mx-auto px-6">
        <h1 class="text-5xl font-bold mb-10">Contact Us</h1>

        <form class="bg-white shadow-xl p-8 rounded-xl">
          <div class="grid md:grid-cols-2 gap-4">
            <input
              type="text"
              placeholder="Your Name"
              class="border p-3 rounded-lg"
            />

            <input
              type="email"
              placeholder="Your Email"
              class="border p-3 rounded-lg"
            />
          </div>

          <input
            type="text"
            placeholder="Subject"
            class="border p-3 rounded-lg w-full mt-4"
          />

          <textarea
            rows="6"
            placeholder="Message"
            class="border p-3 rounded-lg w-full mt-4"
          ></textarea>

          <button class="bg-indigo-600 text-white px-8 py-3 rounded-lg mt-4">
            Send Message
          </button>
        </form>
      </div>
    </section>
  </body>
</html>
